<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="description" content="MovieFlix - Seu Cinema Favorito. Descubra filmes em tendência, populares e melhor avaliados usando a API TMDB.">
    <meta property="og:title" content="MovieFlix - Seu Cinema Favorito">
    <meta property="og:description" content="Descubra filmes em tendência, populares e melhor avaliados usando a API TMDB.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://image.tmdb.org/t/p/original/wwemzKWzjKYJFfCeiWcinyuqzGJ.jpg">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://image.tmdb.org https://www.youtube.com; frame-src https://www.youtube.com; connect-src 'self' https://api.themoviedb.org;">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23ff6b6b'>🎬</text></svg>">
    <title>MovieFlix - Seu Cinema Favorito</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://image.tmdb.org">
</head>
<body>
    <a href="#app" class="skip-to-content">Pular para conteúdo</a>

    <div id="loading-bar" class="loading-bar"></div>

    <nav class="navbar" role="navigation">
        <div class="navbar-container">
            <div class="logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:middle;margin-right:8px"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>MovieFlix</div>
            <div class="search-container" role="search">
                <input
                    type="text"
                    id="search-input"
                    class="search-input"
                    placeholder="Buscar filmes..."
                    aria-label="Buscar filmes"
                >
                <button id="search-btn" class="search-btn" aria-label="Buscar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
            </div>
        </div>
    </nav>

    <div id="live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <main id="app" class="app-container" role="main" tabindex="-1"></main>

    <div id="toast-container" class="toast-container"></div>

    <button id="scroll-to-top" class="scroll-to-top" aria-label="Voltar ao topo" title="Voltar ao topo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>

    <footer class="footer" role="contentinfo">
        <div class="footer-content">
            <div class="footer-section">
                <div class="footer-title">MovieFlix</div>
                <p class="footer-text">Seu Cinema Favorito</p>
            </div>
            <div class="footer-section">
                <div class="footer-subtitle">API</div>
                <p class="footer-text">This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
            </div>
            <div class="footer-section">
                <div class="footer-subtitle">Sobre</div>
                <p class="footer-text">Feito com café e bom cinema. Dados por TMDB.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
